name: SuitcaseLog
options:
  bundleIdPrefix: com.shimondeitel.suitcaselog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SuitcaseLog:
    type: application
    platform: iOS
    sources:
      - path: SuitcaseLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.suitcaselog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SuitcaseLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SuitcaseLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SuitcaseLogTests
      - path: SuitcaseLog.storekit
    dependencies:
      - target: SuitcaseLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.suitcaselog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SuitcaseLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SuitcaseLogUITests
    dependencies:
      - target: SuitcaseLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.suitcaselog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SuitcaseLog:
    build:
      targets:
        SuitcaseLog: all
        SuitcaseLogTests: [test]
        SuitcaseLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SuitcaseLog.storekit
    test:
      config: Debug
      storeKitConfiguration: SuitcaseLog.storekit
      targets:
        - SuitcaseLogTests
        - SuitcaseLogUITests
    archive:
      config: Release
